<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <form id="form">
        <div id="form-section">
            <div>
                <label for="form" class="form-label">New to our community ?</label>
                <p class="form-para">Join us today and start exploring endless opportunities!</p>
            </div>

            <div>
                <input type="text" name="name" class="input-field" placeholder="Username" required>
                <input type="email" name="email" class="input-field" placeholder="Email" required>
                <input type="tel" name="phone" class="input-field" placeholder="Phone Number '10 digit'" required>
                <input type="password" name="password" class="input-field" placeholder="Password" required>
            </div>
        </div>

        <div class="button-div">
            <button class="signup-button">Sign Up</button>
        </div>
    </form>
</body>
</html>
